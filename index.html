<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatMind AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{--turquoise:#22d3ee;}

*{box-sizing:border-box;margin:0;padding:0;}

body{
height:100vh;
font-family:Segoe UI,Tahoma;
background:#020617;
color:#fff;
overflow:hidden;
}

/* רקע */

.bg-layer{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
transition:opacity 1.5s;
filter:brightness(.6);
z-index:0;
}

#bg2{opacity:0;}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.2));
z-index:1;
}

/* CARD */

.card{

position:absolute;
right:50px;
top:50%;
transform:translateY(-50%);

width:420px;
height:94vh;

display:flex;
flex-direction:column;

padding:25px;

border-radius:28px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.2);

z-index:2;

}

h1{
text-align:center;
margin-bottom:15px;
color:var(--turquoise);
}

select,button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-bottom:10px;
}

button{
background:var(--turquoise);
font-weight:bold;
cursor:pointer;
}

.result-scroll-wrapper{
flex:1;
overflow:auto;
background:rgba(0,0,0,.25);
border-radius:16px;
padding:15px;
margin-bottom:15px;
}

.card-footer{
border-top:1px solid rgba(255,255,255,.1);
padding-top:10px;
}

.link-btn{
display:block;
padding:8px;
border-radius:10px;
background:rgba(255,255,255,.08);
margin-top:6px;
text-align:center;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

<h1>🐱 CatMind AI</h1>

<select id="mainSymptom">

<option value="">בחר בעיה</option>
<option value="Vomiting">הקאות</option>
<option value="Diarrhea">שלשול</option>
<option value="Constipation">עצירות</option>
<option value="Loss of appetite">חוסר תיאבון</option>
<option value="Weight loss">ירידה במשקל</option>
<option value="Breathing difficulty">קושי בנשימה</option>
<option value="Coughing">שיעול</option>
<option value="Sneezing">התעטשות</option>
<option value="Eye discharge">הפרשות מהעיניים</option>
<option value="Itching">גירודים</option>

</select>

<button onclick="executeAnalysis()">נתח מקרה</button>

<div class="result-scroll-wrapper">

<div id="resultContainer">

האבחנה תופיע כאן...

</div>

</div>

<div class="card-footer">

<a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">
Browse All Breeds
</a>

<a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">
ד"ר טלי שטיין
</a>

<a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">
ד"ר תמר פלידל
</a>

</div>

</div>

<script>

/* תמונות חתולים */

const images=[

"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
"https://images.unsplash.com/photo-1573865526739-10659fec78a5",
"https://images.unsplash.com/photo-1495360010541-f48722b34f7d",
"https://images.unsplash.com/photo-1511044568932-338cba0ad803",
"https://images.unsplash.com/photo-1533738363-b7f9aef128ce",
"https://images.unsplash.com/photo-1548247416-ec66f4900b2e",
"https://images.unsplash.com/photo-1513245543132-31f507417b26",
"https://images.unsplash.com/photo-1518791841217-8f162f1e1131"

];

let currentIndex=Math.floor(Math.random()*images.length);
let activeLayer=1;

const bg1=document.getElementById("bg1");
const bg2=document.getElementById("bg2");

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;

function nextBackground(){

let nextIndex;

do{

nextIndex=Math.floor(Math.random()*images.length);

}while(nextIndex===currentIndex);

currentIndex=nextIndex;

if(activeLayer===1){

bg2.style.backgroundImage=`url(${images[currentIndex]})`;
bg2.style.opacity=1;
bg1.style.opacity=0;
activeLayer=2;

}else{

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
activeLayer=1;

}

}

setInterval(nextBackground,8000);

/* AI */

async function executeAnalysis(){

const select=document.getElementById("mainSymptom");
const result=document.getElementById("resultContainer");

if(!select.value){

result.innerHTML="⚠ אנא בחר סימפטום";

return;

}

result.innerHTML="🔍 מנתח...";

try{

const response=await fetch(
"https://catmind-ai-server.onrender.com/generate",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:select.value
})
}
);

const data=await response.json();

result.innerHTML=marked.parse(data.result);

}catch(e){

result.innerHTML="❌ שגיאה בחיבור לשרת";

}

}

</script>

</body>
</html>
