<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatMind AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{ --turquoise:#22d3ee; }

*{box-sizing:border-box;margin:0;padding:0;}

body{
height:100vh;
font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
color:#fff;
background:#020617;
overflow:hidden;
}

/* רקע */

.bg-layer{
position:fixed;
inset:0;
background-size:cover;
background-position:center 20%;
background-repeat:no-repeat;
transition:opacity 1.5s ease;
filter:brightness(0.6) contrast(1.1);
z-index:0;
}

#bg2{opacity:0;}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0.4) 50%,rgba(0,0,0,0.1) 100%);
z-index:1;
}

/* CARD */

.card{
position:absolute;
right:50px;
top:50%;
transform:translateY(-50%);
z-index:2;

width:420px;
max-width:90%;
height:94vh;

display:flex;
flex-direction:column;

background:linear-gradient(145deg,rgba(255,255,255,0.12),rgba(255,255,255,0.03));

backdrop-filter:blur(40px) saturate(150%);
-webkit-backdrop-filter:blur(40px) saturate(150%);

border-radius:28px;
padding:25px;

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 40px 100px rgba(0,0,0,0.6);
}

.card-header{flex-shrink:0;margin-bottom:10px;}

h1{
text-align:center;
font-size:22px;
margin-bottom:15px;
color:var(--turquoise);
}

select{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.2);
margin-bottom:12px;
background:#0f172a;
color:#fff;
font-size:14px;
}

button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:var(--turquoise);
font-weight:700;
cursor:pointer;
color:#06131c;
font-size:16px;
}

.result-scroll-wrapper{
flex:1;
overflow-y:auto;
margin-bottom:15px;
background:rgba(0,0,0,0.2);
border-radius:18px;
border:1px solid rgba(34,211,238,0.1);
}

#resultContainer{
padding:18px;
font-size:14.5px;
line-height:1.7;
color:#e2e8f0;
direction:rtl;
text-align:right;
}

.card-footer{
flex-shrink:0;
display:flex;
flex-direction:column;
gap:10px;
border-top:1px solid rgba(255,255,255,0.1);
padding-top:15px;
}

.disclaimer{
padding:10px;
border-radius:14px;
background:rgba(251,191,36,0.1);
border:1px solid rgba(251,191,36,0.2);
font-size:10.5px;
color:#fde68a;
text-align:center;
}

.section-title{
color:var(--turquoise);
font-size:12px;
margin-bottom:4px;
font-weight:600;
}

.links-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.link-btn{
display:block;
text-align:center;
padding:8px;
border-radius:10px;
background:rgba(255,255,255,0.07);
color:#fff;
text-decoration:none;
font-size:11.5px;
border:1px solid rgba(255,255,255,0.1);
}

.link-btn:hover{
background:rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

<div class="card-header">

<h1>🐱 CatMind AI</h1>

<select id="mainSymptom">

<option value="">בחר בעיה מהרשימה</option>
<option value="Vomiting">הקאות</option>
<option value="Diarrhea">שלשול</option>
<option value="Constipation">עצירות</option>
<option value="Loss of appetite">חוסר תיאבון</option>
<option value="Weight loss">ירידה במשקל</option>
<option value="Breathing difficulty">קושי בנשימה</option>
<option value="Coughing">שיעול</option>
<option value="Frequent sneezing">התעטשויות</option>
<option value="Eye discharge">הפרשות מהעיניים</option>
<option value="Excessive itching">גירודים</option>
<option value="Limping">צליעה</option>
<option value="Blood in urine">דם בשתן</option>
<option value="Behavioral changes">שינויים בהתנהגות</option>
<option value="Trembling">רעידות</option>
<option value="Seizures">פרכוסים</option>

</select>

<button onclick="executeAnalysis()">נתח מקרה</button>

</div>

<div class="result-scroll-wrapper">
<div id="resultContainer">האבחנה תופיע כאן...</div>
</div>

<div class="card-footer">

<div class="disclaimer">
⚠ הכלי להכוונה בלבד ואינו מחליף ייעוץ וטרינרי.
</div>

<div>
<div class="section-title">מידע נוסף</div>
<a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">Browse All Breeds</a>
</div>

<div>
<div class="section-title">וטרינרים מומלצים</div>
<div class="links-grid">
<a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">ד"ר טלי שטיין</a>
<a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">ד"ר תמר פלידל</a>
</div>
</div>

</div>
</div>

<script>

/* הרבה תמונות חתולים */

const images=[

"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=1920",
"https://images.unsplash.com/photo-1573865526739-10659fec78a5?q=80&w=1920",
"https://images.unsplash.com/photo-1495360010541-f48722b34f7d?q=80&w=1920",
"https://images.unsplash.com/photo-1511044568932-338cba0ad803?q=80&w=1920",
"https://images.unsplash.com/photo-1533738363-b7f9aef128ce?q=80&w=1920",
"https://images.unsplash.com/photo-1548247416-ec66f4900b2e?q=80&w=1920",
"https://images.unsplash.com/photo-1513245543132-31f507417b26?q=80&w=1920",
"https://images.unsplash.com/photo-1518791841217-8f162f1e1131?q=80&w=1920",
"https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=1920",
"https://images.unsplash.com/photo-1516750484197-6b28d10c91ea?q=80&w=1920",

"https://images.unsplash.com/photo-1526336024174-e58f5cdd8e13?q=80&w=1920",
"https://images.unsplash.com/photo-1530281700549-e82e7bf110d6?q=80&w=1920",
"https://images.unsplash.com/photo-1568152950566-c1bf43f4ab28?q=80&w=1920",
"https://images.unsplash.com/photo-1596854407944-bf87f6fdd49e?q=80&w=1920",
"https://images.unsplash.com/photo-1606214174585-fe31582dc6ee?q=80&w=1920",
"https://images.unsplash.com/photo-1592194996308-7b43878e84a6?q=80&w=1920",
"https://images.unsplash.com/photo-1601758228041-f3b2795255f1?q=80&w=1920",
"https://images.unsplash.com/photo-1543852786-1cf6624b9987?q=80&w=1920",
"https://images.unsplash.com/photo-1518791841217-8f162f1e1131?q=80&w=1920",
"https://images.unsplash.com/photo-1513360371669-4adf3dd7dff8?q=80&w=1920"

];

let currentIndex=Math.floor(Math.random()*images.length);
let activeLayer=1;

const bg1=document.getElementById("bg1");
const bg2=document.getElementById("bg2");

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;

function nextBackground(){

let nextIndex;

do{
nextIndex=Math.floor(Math.random()*images.length);
}
while(nextIndex===currentIndex);

currentIndex=nextIndex;

if(activeLayer===1){

bg2.style.backgroundImage=`url(${images[currentIndex]})`;
bg2.style.opacity=1;
bg1.style.opacity=0;
activeLayer=2;

}else{

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
activeLayer=1;

}

}

setInterval(nextBackground,8000);

</script>

</body>
</html>
