<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatMind AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{
--turquoise:#22d3ee;
--green:#22c55e;
--yellow:#eab308;
--orange:#f97316;
--red:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
height:100vh;
font-family:'Segoe UI',Tahoma;
color:#fff;
background:#020617;
overflow:hidden;
}

/* BACKGROUND */

.bg-layer{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
transition:opacity 1.5s;
filter:brightness(.55);
z-index:0;
}

#bg2{opacity:0;}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.4),rgba(0,0,0,.1));
z-index:1;
}

/* CARD */

.card{

position:absolute;
right:50px;
top:50%;
transform:translateY(-50%);

width:440px;
max-width:92%;
height:94vh;

display:flex;
flex-direction:column;

background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.03));

backdrop-filter:blur(40px);

border-radius:28px;

padding:25px;

border:1px solid rgba(255,255,255,.2);

box-shadow:0 40px 100px rgba(0,0,0,.6);

z-index:2;

}

h1{
text-align:center;
margin-bottom:12px;
color:var(--turquoise);
}

/* SYMPTOMS LIST */

.symptoms{

flex:0 0 auto;
height:170px;

overflow:auto;

border-radius:14px;

background:#0f172a;

padding:10px;

border:1px solid rgba(255,255,255,.1);

margin-bottom:10px;

}

.symptoms label{

display:block;
font-size:13px;
margin:3px 0;

}

button{

width:100%;
padding:13px;
border-radius:14px;
border:none;

background:var(--turquoise);

font-weight:bold;
cursor:pointer;

margin-bottom:10px;

}

/* RESULT */

.result-scroll-wrapper{

flex:1;
overflow:auto;

background:rgba(0,0,0,.25);

border-radius:18px;

padding:15px;

margin-bottom:10px;

}

#resultContainer{

font-size:14.5px;
line-height:1.6;

}

.urgency-green{color:var(--green);font-weight:bold;}
.urgency-yellow{color:var(--yellow);font-weight:bold;}
.urgency-orange{color:var(--orange);font-weight:bold;}
.urgency-red{color:var(--red);font-weight:bold;}

/* FOOTER */

.card-footer{
border-top:1px solid rgba(255,255,255,.1);
padding-top:10px;
}

.links-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.link-btn{

display:block;
text-align:center;

padding:7px;

border-radius:10px;

background:rgba(255,255,255,.08);

color:#fff;

text-decoration:none;

font-size:11px;

}

</style>
</head>

<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

<h1>🐱 CatMind AI</h1>

<div class="symptoms" id="symptomsList"></div>

<button onclick="executeAnalysis()">נתח סימפטומים</button>

<div class="result-scroll-wrapper">

<div id="resultContainer">
בחר סימפטומים ונתח
</div>

</div>

<div class="card-footer">

<div class="links-grid">

<a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">
ד"ר טלי שטיין
</a>

<a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">
ד"ר תמר פלידל
</a>

<a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">
גזעי חתולים
</a>

<a class="link-btn" href="https://icatcare.org/" target="_blank">
Cat Care
</a>

</div>

</div>

</div>

<script>

/* ===== 80 סימפטומים ===== */

const symptoms=[

"הקאות","שלשול","עצירות","חוסר תיאבון","ירידה במשקל","עלייה במשקל",
"עייפות קיצונית","קושי בנשימה","שיעול","התעטשויות",
"הפרשות מהאף","הפרשות מהעיניים","גירודים","נשירת שיער",
"פצעים בעור","נפיחות בגוף","צליעה","דם בשתן",
"שינויים בהתנהגות","אגרסיביות","רעידות","פרכוסים",
"חום גבוה","אובדן הכרה","קצף מהפה","חולשה",
"שתייה מרובה","השתנה מרובה","ריח רע מהפה",
"חניכיים אדומות","שיניים שבורות","חוסר שיווי משקל",
"הליכה מוזרה","יללות חזקות","חוסר תגובה",
"עיניים אדומות","עיניים נפוחות","עפעף שלישי",
"אוזניים מלוכלכות","ריח מהאוזן","גרד באוזן",
"התגרדות בראש","גירוד בצוואר","גירוד בגב",
"פצע פתוח","פצע מדמם","נפיחות בפנים",
"בטן נפוחה","בטן קשה","קושי בהליכה",
"ישיבה מוזרה","נשימה מהירה","נשימה כבדה",
"שינה מרובה","חוסר שינה","חוסר תנועה",
"רעד ברגליים","רעד בראש","בלבול",
"הליכה במעגלים","פגיעה בראייה","אובדן ראייה",
"חוסר שליטה בצרכים","שתן מחוץ לארגז",
"שלשול דמי","הקאות דמיות","התייבשות"

];

const container=document.getElementById("symptomsList");

symptoms.forEach(s=>{
container.innerHTML+=`
<label>
<input type="checkbox" value="${s}">
${s}
</label>
`;
});

/* BACKGROUND */

const images=[
"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
"https://images.unsplash.com/photo-1573865526739-10659fec78a5",
"https://images.unsplash.com/photo-1495360010541-f48722b34f7d",
"https://images.unsplash.com/photo-1511044568932-338cba0ad803",
"https://images.unsplash.com/photo-1533738363-b7f9aef128ce",
"https://images.unsplash.com/photo-1548247416-ec66f4900b2e",
"https://images.unsplash.com/photo-1518791841217-8f162f1e1131"
];

let currentIndex=Math.floor(Math.random()*images.length);
let activeLayer=1;

const bg1=document.getElementById("bg1");
const bg2=document.getElementById("bg2");

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;

function nextBackground(){

let nextIndex;

do{
nextIndex=Math.floor(Math.random()*images.length);
}
while(nextIndex===currentIndex);

currentIndex=nextIndex;

if(activeLayer===1){

bg2.style.backgroundImage=`url(${images[currentIndex]})`;
bg2.style.opacity=1;
bg1.style.opacity=0;
activeLayer=2;

}else{

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
activeLayer=1;

}

}

setInterval(nextBackground,10000);

/* AI */

async function executeAnalysis(){

const result=document.getElementById("resultContainer");

const selected=[...document.querySelectorAll("input:checked")].map(e=>e.value);

if(selected.length===0){

result.innerHTML="בחר לפחות סימפטום אחד";

return;

}

result.innerHTML="🔍 מנתח סימפטומים...";

try{

const response=await fetch(
"https://catmind-ai-server.onrender.com/generate",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ text:selected.join(", ") })
}
);

const data=await response.json();

result.innerHTML=marked.parse(data.result);

}catch{

result.innerHTML="שגיאת שרת";

}

}

</script>

</body>
</html>
