<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatMind AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--turquoise:#22d3ee;--green:#22c55e;--yellow:#facc15;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;font-family:'Segoe UI',Tahoma,Verdana,sans-serif;color:#fff;background:#020617;overflow:hidden;}
.bg-layer{position:fixed;inset:0;background-size:cover;background-position:center 20%;background-repeat:no-repeat;transition:opacity 1.8s ease;filter:brightness(.55) contrast(1.1);z-index:0;}
#bg2{opacity:0;}
.overlay{position:fixed;inset:0;background:linear-gradient(to right,rgba(0,0,0,.85),rgba(0,0,0,.4),rgba(0,0,0,.1));z-index:1;}

.card{
  position:absolute;right:50px;top:50%;transform:translateY(-50%);
  z-index:2;width:440px;max-width:93%;height:94vh;
  display:flex;flex-direction:column;gap:8px;
  background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
  backdrop-filter:blur(40px) saturate(150%);border-radius:28px;padding:20px;
  border:1px solid rgba(255,255,255,.2);box-shadow:0 40px 100px rgba(0,0,0,.6);overflow:hidden;
}
@media(max-width:768px){
  .card{position:relative;right:auto;top:auto;transform:none;margin:12px auto;height:92vh;}
  body{overflow-y:auto;}
}

/* HEADER ROW */
.header-row{display:flex;align-items:center;justify-content:space-between;}
h1{font-size:21px;color:var(--turquoise);letter-spacing:.5px;}

/* LANGUAGE SWITCHER */
.lang-switcher{display:flex;gap:6px;align-items:center;}
.lang-btn{
  font-size:22px;cursor:pointer;border-radius:8px;
  padding:2px 5px;border:2px solid transparent;
  transition:.2s;opacity:.5;line-height:1;
  background:transparent;
}
.lang-btn:hover{opacity:.8;}
.lang-btn.active{opacity:1;border-color:var(--turquoise);background:rgba(34,211,238,.15);}

/* SYMPTOMS */
.symptoms-label{font-size:12px;color:rgba(255,255,255,.5);text-align:center;}
.symptoms-grid{display:flex;flex-wrap:wrap;gap:6px;overflow-y:auto;max-height:165px;padding:4px 2px;}
.symptoms-grid::-webkit-scrollbar{width:3px;}
.symptoms-grid::-webkit-scrollbar-thumb{background:var(--turquoise);border-radius:10px;}
.tag{padding:5px 11px;border-radius:20px;font-size:12.5px;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#cbd5e1;transition:.2s;user-select:none;}
.tag:hover{background:rgba(34,211,238,.15);border-color:var(--turquoise);color:#fff;}
.tag.selected{background:rgba(34,211,238,.25);border-color:var(--turquoise);color:var(--turquoise);font-weight:700;}
.selected-summary{font-size:12px;color:rgba(255,255,255,.45);text-align:center;min-height:16px;}

/* FOLLOW-UP */
#followUp{display:none;gap:6px;flex-direction:column;}
.fq-label{font-size:11.5px;color:rgba(255,255,255,.4);}
.fq-row{display:flex;gap:6px;flex-wrap:wrap;}
.fq-btn{padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#cbd5e1;transition:.2s;user-select:none;}
.fq-btn:hover{background:rgba(250,204,21,.15);border-color:var(--yellow);color:#fff;}
.fq-btn.selected{background:rgba(250,204,21,.25);border-color:var(--yellow);color:var(--yellow);font-weight:700;}

/* BUTTON */
button#analyzeBtn{padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--turquoise),#0ea5e9);font-weight:700;cursor:pointer;color:#06131c;font-size:15px;transition:.2s;flex-shrink:0;}
button#analyzeBtn:hover{opacity:.9;transform:translateY(-1px);}
button#analyzeBtn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* URGENCY */
#urgencyBar{display:none;padding:9px 12px;border-radius:12px;font-weight:700;text-align:center;font-size:14px;flex-shrink:0;}
.urgency-low{background:linear-gradient(135deg,#16a34a,var(--green));}
.urgency-medium{background:linear-gradient(135deg,#ca8a04,var(--yellow));color:#1a1000;}
.urgency-high{background:linear-gradient(135deg,#b91c1c,var(--red));}
.urgency-critical{background:linear-gradient(135deg,#7c3aed,#ef4444);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}

/* RESULT */
.result-scroll-wrapper{flex:1;overflow-y:auto;min-height:0;background:rgba(0,0,0,.2);border-radius:18px;border:1px solid rgba(34,211,238,.1);}
.result-scroll-wrapper::-webkit-scrollbar{width:4px;}
.result-scroll-wrapper::-webkit-scrollbar-thumb{background:var(--turquoise);border-radius:10px;}
#resultContainer{padding:16px;font-size:14px;line-height:1.75;color:#e2e8f0;text-align:right;}
#resultContainer h2,#resultContainer h3{color:var(--turquoise);margin:10px 0 4px;}
#resultContainer strong{color:#fff;}
#resultContainer ul{padding-right:18px;}
#resultContainer li{margin-bottom:4px;}
.cursor::after{content:'▌';animation:blink .7s infinite;color:var(--turquoise);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* DISCLAIMER */
.disclaimer{padding:8px 10px;flex-shrink:0;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:10px;font-size:11px;color:#fde68a;text-align:center;}

/* LINKS */
.links-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;flex-shrink:0;}
.link-btn{display:block;text-align:center;padding:7px 6px;border-radius:10px;background:rgba(255,255,255,.06);color:#fff;text-decoration:none;font-size:11px;border:1px solid rgba(255,255,255,.1);transition:.25s;}
.link-btn:hover{background:rgba(34,211,238,.15);border-color:var(--turquoise);}
</style>
</head>
<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

  <div class="header-row">
    <div style="width:64px"></div>
    <h1>🐱 CatMind AI</h1>
    <div class="lang-switcher">
      <div class="lang-btn active" id="btnHe" onclick="setLang('he')" title="עברית">🇮🇱</div>
      <div class="lang-btn"        id="btnEn" onclick="setLang('en')" title="English">🇺🇸</div>
    </div>
  </div>

  <div class="symptoms-label" id="lblSymptoms">בחר סימפטום אחד או יותר</div>
  <div class="symptoms-grid" id="symptomsGrid"></div>
  <div class="selected-summary" id="selectedSummary"></div>

  <div id="followUp">
    <div class="fq-label" id="lblAge">גיל החתול:</div>
    <div class="fq-row" id="fqAgeRow"></div>
    <div class="fq-label" id="lblLife">סוג חיים:</div>
    <div class="fq-row" id="fqLifeRow"></div>
    <div class="fq-label" id="lblDuration">משך הסימפטום:</div>
    <div class="fq-row" id="fqDurationRow"></div>
  </div>

  <button id="analyzeBtn" onclick="executeAnalysis()">🔍 נתח מקרה</button>
  <div id="urgencyBar"></div>

  <div class="result-scroll-wrapper">
    <div id="resultContainer"></div>
  </div>

  <div class="disclaimer" id="lblDisclaimer">⚠ הכלי להכוונה בלבד ואינו מחליף ייעוץ וטרינרי מקצועי.</div>

  <div class="links-grid">
    <a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">🩺 ד"ר טלי שטיין</a>
    <a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">🩺 ד"ר תמר פלידל</a>
    <a class="link-btn" href="https://icatcare.org/" target="_blank">🌍 International Cat Care</a>
    <a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">🐱 Browse All Breeds</a>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   TRANSLATIONS
═══════════════════════════════════════ */
const T = {
  he: {
    dir: 'rtl',
    htmlLang: 'he',
    symptomsLabel: 'בחר סימפטום אחד או יותר',
    noSelected: 'לא נבחרו סימפטומים',
    selectedPrefix: '✔ נבחרו: ',
    ageLabel: 'גיל החתול:',
    lifeLabel: 'סוג חיים:',
    durationLabel: 'משך הסימפטום:',
    ageOpts: ['גור (עד שנה)', 'בוגר (1–10)', 'קשיש (10+)'],
    lifeOpts: ['חתול בית', 'חתול חוץ', 'בית + חוץ'],
    durationOpts: ['היום בלבד', '2–3 ימים', 'שבוע ומעלה'],
    analyzeBtn: '🔍 נתח מקרה',
    analyzing: '⏳ מנתח...',
    placeholder: 'האבחנה תופיע כאן...',
    noSymptom: '⚠ בחר לפחות סימפטום אחד',
    serverError: '❌ השרת לא זמין כרגע. נסה שוב בעוד מספר שניות.',
    disclaimer: '⚠ הכלי להכוונה בלבד ואינו מחליף ייעוץ וטרינרי מקצועי.',
    urgency: {
      1: '✅ לא דחוף — מעקב ביתי מספיק',
      2: '⚠️ מומלץ לפנות לווטרינר תוך יום-יומיים',
      3: '🚨 פנה לווטרינר היום!',
      4: '🆘 חירום — פנה לווטרינר מיד!',
    },
    notSpecified: 'לא צוין',
    symptoms: [
      "הקאות","שלשול","עצירות","חוסר תיאבון","ירידה במשקל",
      "עלייה חריגה במשקל","עייפות קיצונית","קושי בנשימה","שיעול",
      "התעטשויות תכופות","הפרשות מהאף","הפרשות מהעיניים",
      "גירודים מרובים","נשירת שיער חריגה","פצעים בעור","נפיחות בגוף",
      "צליעה","חוסר שימוש בארגז חול","דם בשתן","שינויים בהתנהגות",
      "אגרסיביות פתאומית","רעידות","פרכוסים","הרעלה אפשרית",
      "בליעת חפץ זר","חום גבוה","אובדן הכרה","שתייה מוגברת",
      "השתנה מוגברת","כאב בעת מגע","נשימה פה פתוח","בטן נפוחה",
      "ריח רע מהפה","חוסר שיווי משקל"
    ],
    promptLang: 'ענה בעברית בלבד.',
  },
  en: {
    dir: 'ltr',
    htmlLang: 'en',
    symptomsLabel: 'Select one or more symptoms',
    noSelected: 'No symptoms selected',
    selectedPrefix: '✔ Selected: ',
    ageLabel: 'Cat age:',
    lifeLabel: 'Lifestyle:',
    durationLabel: 'Duration:',
    ageOpts: ['Kitten (under 1yr)', 'Adult (1–10)', 'Senior (10+)'],
    lifeOpts: ['Indoor cat', 'Outdoor cat', 'Indoor + Outdoor'],
    durationOpts: ['Today only', '2–3 days', 'A week or more'],
    analyzeBtn: '🔍 Analyze Case',
    analyzing: '⏳ Analyzing...',
    placeholder: 'Diagnosis will appear here...',
    noSymptom: '⚠ Please select at least one symptom',
    serverError: '❌ Server unavailable. Please try again in a few seconds.',
    disclaimer: '⚠ This tool is for guidance only and does not replace professional veterinary advice.',
    urgency: {
      1: '✅ Not urgent — home monitoring is sufficient',
      2: '⚠️ Recommended to see a vet within 1–2 days',
      3: '🚨 See a vet today!',
      4: '🆘 Emergency — see a vet immediately!',
    },
    notSpecified: 'Not specified',
    symptoms: [
      "Vomiting","Diarrhea","Constipation","Loss of appetite","Weight loss",
      "Unusual weight gain","Extreme lethargy","Breathing difficulty","Coughing",
      "Frequent sneezing","Nasal discharge","Eye discharge",
      "Excessive scratching","Abnormal hair loss","Skin sores","Body swelling",
      "Limping","Not using litter box","Blood in urine","Behavioral changes",
      "Sudden aggression","Tremors","Seizures","Possible poisoning",
      "Swallowed foreign object","High fever","Loss of consciousness","Excessive drinking",
      "Excessive urination","Pain when touched","Open-mouth breathing","Bloated belly",
      "Bad breath","Loss of balance"
    ],
    promptLang: 'Always respond in English.',
  }
};

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let lang = 'he';
let selected = new Set();

/* ═══════════════════════════════════════
   LANGUAGE SWITCH
═══════════════════════════════════════ */
function setLang(l) {
  lang = l;
  const t = T[l];
  document.documentElement.lang = t.htmlLang;
  document.documentElement.dir  = t.dir;

  // active flag button
  document.getElementById('btnHe').classList.toggle('active', l==='he');
  document.getElementById('btnEn').classList.toggle('active', l==='en');

  // result text direction
  const rc = document.getElementById('resultContainer');
  rc.style.direction  = t.dir;
  rc.style.textAlign  = l==='he' ? 'right' : 'left';

  // labels
  document.getElementById('lblSymptoms').textContent  = t.symptomsLabel;
  document.getElementById('lblAge').textContent        = t.ageLabel;
  document.getElementById('lblLife').textContent       = t.lifeLabel;
  document.getElementById('lblDuration').textContent   = t.durationLabel;
  document.getElementById('analyzeBtn').textContent    = t.analyzeBtn;
  document.getElementById('lblDisclaimer').textContent = t.disclaimer;

  // placeholder
  if (!rc.dataset.hasResult) rc.textContent = t.placeholder;

  // rebuild symptom tags (keep selections by index)
  selected.clear();
  buildSymptoms();
  updateSummary();

  // rebuild follow-up buttons
  buildFQRow('fqAgeRow',      'age',      t.ageOpts);
  buildFQRow('fqLifeRow',     'life',     t.lifeOpts);
  buildFQRow('fqDurationRow', 'duration', t.durationOpts);
}

/* ═══════════════════════════════════════
   SYMPTOM TAGS
═══════════════════════════════════════ */
function buildSymptoms() {
  const grid = document.getElementById('symptomsGrid');
  grid.innerHTML = '';
  T[lang].symptoms.forEach(s => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = s;
    tag.onclick = () => {
      if (selected.has(s)) { selected.delete(s); tag.classList.remove('selected'); }
      else                 { selected.add(s);    tag.classList.add('selected'); }
      updateSummary();
    };
    grid.appendChild(tag);
  });
}

function updateSummary() {
  const t   = T[lang];
  const sum = document.getElementById('selectedSummary');
  const fu  = document.getElementById('followUp');
  if (selected.size === 0) {
    sum.textContent    = t.noSelected;
    fu.style.display   = 'none';
  } else {
    sum.textContent    = t.selectedPrefix + [...selected].join(' · ');
    fu.style.display   = 'flex';
  }
}

/* ═══════════════════════════════════════
   FOLLOW-UP
═══════════════════════════════════════ */
function buildFQRow(rowId, group, opts) {
  const row = document.getElementById(rowId);
  row.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('div');
    b.className = 'fq-btn';
    b.dataset.group = group;
    b.textContent = o;
    b.onclick = () => toggleFQ(b);
    row.appendChild(b);
  });
}

function toggleFQ(el) {
  document.querySelectorAll(`.fq-btn[data-group="${el.dataset.group}"]`).forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function getFQ(g) {
  const el = document.querySelector(`.fq-btn[data-group="${g}"].selected`);
  return el ? el.textContent : T[lang].notSpecified;
}

/* ═══════════════════════════════════════
   BACKGROUNDS
═══════════════════════════════════════ */
const images = [
  "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=1920",
  "https://images.unsplash.com/photo-1573865526739-10659fec78a5?q=80&w=1920",
  "https://images.unsplash.com/photo-1518791841217-8f162f1e1131?q=80&w=1920",
  "https://images.unsplash.com/photo-1495360010541-f48722b34f7d?q=80&w=1920",
  "https://images.unsplash.com/photo-1511044568932-338cba0ad803?q=80&w=1920",
  "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?q=80&w=1920",
  "https://images.unsplash.com/photo-1548247416-ec66f4900b2e?q=80&w=1920",
  "https://images.unsplash.com/photo-1513245543132-31f507417b26?q=80&w=1920",
  "https://images.unsplash.com/photo-1606214174585-fe31582dc6ee?q=80&w=1920",
  "https://images.unsplash.com/photo-1592194996308-7b43878e84a6?q=80&w=1920",
  "https://images.unsplash.com/photo-1574158622682-e40e69881006?q=80&w=1920",
  "https://images.unsplash.com/photo-1561948955-570b270e7c36?q=80&w=1920",
  "https://images.unsplash.com/photo-1526336024174-e58f5cdd8e13?q=80&w=1920",
  "https://images.unsplash.com/photo-1583795128727-6ec3642408f8?q=80&w=1920",
  "https://images.unsplash.com/photo-1596854407944-bf87f6fdd49e?q=80&w=1920",
  "https://images.unsplash.com/photo-1587300003388-59208cc962cb?q=80&w=1920",
  "https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=1920",
  "https://images.unsplash.com/photo-1529778873920-4da4926a72c2?q=80&w=1920",
];
let bgIdx=Math.floor(Math.random()*images.length), activeLayer=1;
const bg1=document.getElementById('bg1'), bg2=document.getElementById('bg2');
bg1.style.backgroundImage=`url(${images[bgIdx]})`; bg1.style.opacity=1;
function nextBg(){
  let n; do{n=Math.floor(Math.random()*images.length);}while(n===bgIdx); bgIdx=n;
  if(activeLayer===1){bg2.style.backgroundImage=`url(${images[bgIdx]})`;bg2.style.opacity=1;bg1.style.opacity=0;activeLayer=2;}
  else{bg1.style.backgroundImage=`url(${images[bgIdx]})`;bg1.style.opacity=1;bg2.style.opacity=0;activeLayer=1;}
}
setInterval(nextBg, 10000);

/* ═══════════════════════════════════════
   WAKE SERVER
═══════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  fetch("https://catmind-ai-server.onrender.com/generate",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:"ping"})
  }).catch(()=>{});
});

/* ═══════════════════════════════════════
   URGENCY
═══════════════════════════════════════ */
function setUrgency(level) {
  const bar = document.getElementById('urgencyBar');
  bar.style.display = 'block';
  const clsMap = {1:'urgency-low',2:'urgency-medium',3:'urgency-high',4:'urgency-critical'};
  bar.className  = clsMap[level] || 'urgency-medium';
  bar.innerHTML  = T[lang].urgency[level] || T[lang].urgency[2];
}

/* ═══════════════════════════════════════
   ANALYSIS
═══════════════════════════════════════ */
async function executeAnalysis() {
  const t        = T[lang];
  const resultEl = document.getElementById('resultContainer');
  const btn      = document.getElementById('analyzeBtn');
  const urgEl    = document.getElementById('urgencyBar');

  if (selected.size === 0) { resultEl.textContent = t.noSymptom; return; }

  btn.disabled = true; btn.textContent = t.analyzing;
  urgEl.style.display = 'none';
  resultEl.innerHTML  = ''; resultEl.classList.add('cursor');
  resultEl.dataset.hasResult = '';

  const prompt = `You are a veterinary AI specialized ONLY in cats. ${t.promptLang}

Symptoms: ${[...selected].join(', ')}
Age: ${getFQ('age')}
Lifestyle: ${getFQ('life')}
Duration: ${getFQ('duration')}

Reply in markdown format:

## urgency_level
[Number only: 1=not urgent / 2=moderate / 3=urgent / 4=emergency]

## Possible Causes
List from most to least likely.

## What To Do Now
Clear practical steps for the owner.

## Warning Signs
If you see these — go to a vet immediately.`;

  try {
    const response = await fetch("https://catmind-ai-server.onrender.com/generate",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:prompt})
    });
    const data = await response.json();
    finalize(data.result || data.text || '');
    resultEl.dataset.hasResult = '1';
  } catch(e) {
    resultEl.classList.remove('cursor');
    resultEl.textContent = t.serverError;
  } finally {
    btn.disabled = false; btn.textContent = t.analyzeBtn;
  }
}

function finalize(raw) {
  const resultEl = document.getElementById('resultContainer');
  resultEl.classList.remove('cursor');
  resultEl.style.direction = T[lang].dir;
  resultEl.style.textAlign = lang==='he' ? 'right' : 'left';

  // Extract urgency number
  const match = raw.match(/##\s*urgency_level\s*\n+([1-4])/i);
  if (match) setUrgency(parseInt(match[1]));
  else if (/emergency|חירום|immediately|מיד/i.test(raw))     setUrgency(4);
  else if (/urgent|דחוף|today|היום/i.test(raw))               setUrgency(3);
  else if (/moderate|בינוני|days|ימים/i.test(raw))            setUrgency(2);
  else                                                         setUrgency(1);

  // Remove urgency line from display
  const clean = raw.replace(/##\s*urgency_level[\s\S]*?(?=##|$)/i,'').trim();
  resultEl.innerHTML = marked.parse(clean);
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
setLang('he');
</script>
</body>
</html>
