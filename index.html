<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatMind AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--turquoise:#22d3ee;--green:#22c55e;--yellow:#facc15;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',Tahoma,Verdana,sans-serif;color:#fff;background:#020617;}

.bg-layer{position:fixed;inset:0;background-size:cover;background-position:center 20%;background-repeat:no-repeat;transition:opacity 1.8s ease;filter:brightness(.55) contrast(1.1);z-index:0;}
#bg2{opacity:0;}
.overlay{position:fixed;inset:0;background:linear-gradient(to right,rgba(0,0,0,.85),rgba(0,0,0,.4),rgba(0,0,0,.1));z-index:1;}

.card{
  position:fixed;right:50px;top:50%;transform:translateY(-50%);
  z-index:3;width:440px;max-width:93%;height:96vh;
  display:grid;
  grid-template-rows: auto auto 1fr auto auto;
  /* row1=header  row2=top-inputs(capped)  row3=RESULT(1fr)  row4=disclaimer  row5=links */
  gap:5px;
  background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
  backdrop-filter:blur(40px) saturate(150%);
  border-radius:28px;padding:14px 16px;
  border:1px solid rgba(255,255,255,.2);
  box-shadow:0 40px 100px rgba(0,0,0,.6);
  overflow:hidden;
}
@media(max-width:768px){
  .card{position:relative;right:auto;top:auto;transform:none;margin:12px auto;height:auto;
    grid-template-rows:none;display:flex;flex-direction:column;}
  html,body{overflow-y:auto;height:auto;}
}
/* top-section: flex column, scrollable, CAPPED at 44% of viewport height */
.top-section{
  display:flex;flex-direction:column;gap:4px;
  overflow-y:auto;min-height:0;
  max-height:44vh;
}
.top-section::-webkit-scrollbar{width:3px;}
.top-section::-webkit-scrollbar-thumb{background:var(--turquoise);border-radius:10px;}

.header-row{display:flex;align-items:center;justify-content:center;position:relative;}
h1{font-size:18px;color:var(--turquoise);letter-spacing:.5px;}
.lang-switcher{position:absolute;left:0;display:flex;gap:5px;}
.lang-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:2px 7px;font-size:14px;cursor:pointer;transition:.2s;color:#fff;}
.lang-btn:hover{background:rgba(34,211,238,.2);border-color:var(--turquoise);}
.lang-btn.active{background:rgba(34,211,238,.25);border-color:var(--turquoise);}

.symptoms-label{font-size:10.5px;color:rgba(255,255,255,.45);text-align:center;}
.symptoms-grid{overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start;padding:2px;}
.symptoms-grid::-webkit-scrollbar{width:3px;}
.symptoms-grid::-webkit-scrollbar-thumb{background:var(--turquoise);border-radius:10px;}
.tag{padding:3px 9px;border-radius:20px;font-size:11.5px;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#cbd5e1;transition:.18s;user-select:none;height:fit-content;}
.tag:hover{background:rgba(34,211,238,.15);border-color:var(--turquoise);color:#fff;}
.tag.selected{background:rgba(34,211,238,.25);border-color:var(--turquoise);color:var(--turquoise);font-weight:700;}
.selected-summary{font-size:10.5px;color:rgba(255,255,255,.4);text-align:center;min-height:13px;}

#followUp{display:none;gap:3px;flex-direction:column;}
.fq-label{font-size:10.5px;color:rgba(255,255,255,.38);}
.fq-row{display:flex;gap:4px;flex-wrap:wrap;}
.fq-btn{padding:3px 9px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#cbd5e1;transition:.18s;user-select:none;}
.fq-btn:hover{background:rgba(250,204,21,.15);border-color:var(--yellow);color:#fff;}
.fq-btn.selected{background:rgba(250,204,21,.25);border-color:var(--yellow);color:var(--yellow);font-weight:700;}

button#analyzeBtn{padding:9px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--turquoise),#0ea5e9);font-weight:700;cursor:pointer;color:#06131c;font-size:13.5px;transition:.2s;}
button#analyzeBtn:hover{opacity:.9;transform:translateY(-1px);}
button#analyzeBtn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

#urgencyBar{display:none;padding:7px 12px;border-radius:10px;font-weight:700;text-align:center;font-size:12.5px;}
.urgency-low{background:linear-gradient(135deg,#16a34a,var(--green));}
.urgency-medium{background:linear-gradient(135deg,#ca8a04,var(--yellow));color:#1a1000;}
.urgency-high{background:linear-gradient(135deg,#b91c1c,var(--red));}
.urgency-critical{background:linear-gradient(135deg,#7c3aed,#ef4444);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}

/* result — grid row is 1fr so it ALWAYS fills remaining space */
.result-scroll-wrapper{overflow-y:auto;background:rgba(0,0,0,.2);border-radius:14px;border:1px solid rgba(34,211,238,.1);min-height:0;height:100%;}
.result-scroll-wrapper::-webkit-scrollbar{width:4px;}
.result-scroll-wrapper::-webkit-scrollbar-thumb{background:var(--turquoise);border-radius:10px;}
#resultContainer{padding:12px;font-size:13px;line-height:1.7;color:#e2e8f0;direction:rtl;text-align:right;}
#resultContainer h2,#resultContainer h3{color:var(--turquoise);margin:8px 0 3px;}
#resultContainer strong{color:#fff;}
#resultContainer ul{padding-right:16px;}
#resultContainer li{margin-bottom:3px;}
.cursor::after{content:'▌';animation:blink .7s infinite;color:var(--turquoise);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.disclaimer{padding:5px 10px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:8px;font-size:10px;color:#fde68a;text-align:center;}
.links-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.link-btn{display:block;text-align:center;padding:5px;border-radius:8px;background:rgba(255,255,255,.06);color:#fff;text-decoration:none;font-size:10.5px;border:1px solid rgba(255,255,255,.1);transition:.25s;}
.link-btn:hover{background:rgba(34,211,238,.15);border-color:var(--turquoise);}

/* ── WALKING CAT ── */
#catWrap{position:fixed;z-index:10;pointer-events:none;will-change:left,bottom;}
#catWrap svg{width:60px;height:44px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.6));}
#catBubble{position:fixed;z-index:11;pointer-events:none;background:white;color:#333;font-size:12px;font-family:'Segoe UI',sans-serif;padding:4px 10px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.3);white-space:nowrap;opacity:0;transition:opacity 0.4s ease;}
#catBubble::after{content:'';position:absolute;bottom:-7px;left:10px;border:4px solid transparent;border-top-color:white;}
</style>
</head>
<body>

  <div class="header-row">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('he')" id="btnHe">🇮🇱</button>

<script>
const T={
  he:{
    symptoms:["הקאות","שלשול","עצירות","חוסר תיאבון","ירידה במשקל","עלייה חריגה במשקל","עייפות קיצונית","קושי בנשימה","שיעול","התעטשויות תכופות","הפרשות מהאף","הפרשות מהעיניים","גירודים מרובים","נשירת שיער חריגה","פצעים בעור","נפיחות בגוף","צליעה","חוסר שימוש בארגז חול","דם בשתן","שינויים בהתנהגות","אגרסיביות פתאומית","רעידות","פרכוסים","הרעלה אפשרית","בליעת חפץ זר","חום גבוה","אובדן הכרה","שתייה מוגברת","השתנה מוגברת","כאב בעת מגע","נשימה פה פתוח","בטן נפוחה","ריח רע מהפה","חוסר שיווי משקל"],
    lblSymptoms:"בחר סימפטום אחד או יותר",noSelected:"לא נבחרו סימפטומים",selectedPrefix:"✔ נבחרו: ",
    lblAge:"גיל החתול:",lblLife:"סוג חיים:",lblDuration:"משך הסימפטום:",
    age:["גור (עד שנה)","בוגר (1–10)","קשיש (10+)"],
    life:["חתול בית","חתול חוץ","בית + חוץ"],
    duration:["היום בלבד","2–3 ימים","שבוע ומעלה"],
    btnAnalyze:"נתח מקרה",btnAnalyzing:"מנתח...",placeholder:"האבחנה תופיע כאן...",
    disclaimer:"⚠ הכלי להכוונה בלבד ואינו מחליף ייעוץ וטרינרי מקצועי.",
    notSelected:"לא צוין",selectFirst:"⚠ בחר לפחות סימפטום אחד",
    serverError:"❌ השרת לא זמין כרגע. נסה שוב בעוד מספר שניות.",
    urgency:{1:"✅ לא דחוף — מעקב ביתי מספיק",2:"⚠️ מומלץ לפנות לווטרינר תוך יום-יומיים",3:"🚨 פנה לווטרינר היום!",4:"🆘 חירום — פנה לווטרינר מיד!"},
    dir:"rtl",
    promptIntro:"אתה וטרינר מומחה לחתולים בלבד. ענה תמיד בעברית בלבד.",
    sections:"## רמת דחיפות\n[רק מספר: 1=לא דחוף / 2=בינוני / 3=דחוף / 4=חירום]\n\n## גורמים אפשריים\nרשימה של הגורמים הסבירים ביותר, מהנפוץ לנדיר.\n\n## מה לעשות כעת\nצעדים מעשיים ברורים שהבעלים יכול לעשות.\n\n## סימנים מדאיגים\nאם תראה את אלה — פנה לווטרינר מיד.",
    phrases:["מיאו...","מה זה?","😼","מעניין...","👀","פוסס"],
    urgencyRgx:/##\s*רמת דחיפות\s*\n+([1-4])/,
    urgencyStrip:/##\s*רמת דחיפות[\s\S]*?(?=##|$)/m,
  },
  en:{
    symptoms:["Vomiting","Diarrhea","Constipation","Loss of appetite","Weight loss","Unusual weight gain","Extreme fatigue","Breathing difficulty","Coughing","Frequent sneezing","Nasal discharge","Eye discharge","Excessive scratching","Abnormal hair loss","Skin wounds","Body swelling","Limping","Not using litter box","Blood in urine","Behavior changes","Sudden aggression","Tremors","Seizures","Possible poisoning","Swallowed foreign object","High fever","Loss of consciousness","Excessive drinking","Excessive urination","Pain when touched","Open-mouth breathing","Bloated belly","Bad breath","Loss of balance"],
    lblSymptoms:"Select one or more symptoms",noSelected:"No symptoms selected",selectedPrefix:"✔ Selected: ",
    lblAge:"Cat's age:",lblLife:"Lifestyle:",lblDuration:"Duration:",
    age:["Kitten (under 1yr)","Adult (1–10)","Senior (10+)"],
    life:["Indoor","Outdoor","Indoor + Outdoor"],
    duration:["Today only","2–3 days","A week or more"],
    btnAnalyze:"Analyze Case",btnAnalyzing:"Analyzing...",placeholder:"Diagnosis will appear here...",
    disclaimer:"⚠ For guidance only — not a substitute for professional veterinary advice.",
    notSelected:"Not specified",selectFirst:"⚠ Please select at least one symptom",
    serverError:"❌ Server unavailable. Please try again in a few seconds.",
    urgency:{1:"✅ Not urgent — home monitoring sufficient",2:"⚠️ Recommend vet visit within 1-2 days",3:"🚨 See a vet today!",4:"🆘 Emergency — see a vet immediately!"},
    dir:"ltr",
    promptIntro:"You are a veterinary AI specialized ONLY in cats. Always respond in English.",
    sections:"## Urgency Level\n[Number only: 1=Not urgent / 2=Moderate / 3=Urgent / 4=Emergency]\n\n## Possible Causes\nList the most likely causes, from common to rare.\n\n## What To Do Now\nClear practical steps the owner can take.\n\n## Warning Signs\nIf you see these — see a vet immediately.",
    phrases:["Meow...","What's that?","😼","Interesting...","👀","Purr..."],
    urgencyRgx:/##\s*Urgency Level\s*\n+([1-4])/,
    urgencyStrip:/##\s*Urgency Level[\s\S]*?(?=##|$)/m,
  }
};

let lang='he';
const selected=new Set();

function setLang(l){
  lang=l;
  document.getElementById('btnHe').classList.toggle('active',l==='he');
  document.getElementById('btnEn').classList.toggle('active',l==='en');
  const t=T[l];
  document.documentElement.lang=l;
  document.documentElement.dir=t.dir;
  document.getElementById('lblSymptoms').textContent=t.lblSymptoms;
  document.getElementById('lblAge').textContent=t.lblAge;
  document.getElementById('lblLife').textContent=t.lblLife;
  document.getElementById('lblDuration').textContent=t.lblDuration;
  document.getElementById('disclaimer').textContent=t.disclaimer;
  document.getElementById('btnText').textContent=t.btnAnalyze;
  document.getElementById('resultContainer').innerHTML=t.placeholder;
  document.getElementById('urgencyBar').style.display='none';
  selected.clear();
  buildSymptoms();
  buildFQ('rowAge','age');
  buildFQ('rowLife','life');
  buildFQ('rowDuration','duration');
  updateSummary();
}

function buildSymptoms(){
  const grid=document.getElementById('symptomsGrid');
  grid.innerHTML='';
  T[lang].symptoms.forEach(s=>{
    const t=document.createElement('div');
    t.className='tag';t.textContent=s;
    t.onclick=()=>{
      if(selected.has(s)){selected.delete(s);t.classList.remove('selected');}
      else{selected.add(s);t.classList.add('selected');}
      updateSummary();
    };
    grid.appendChild(t);
  });
}

function buildFQ(rowId,key){
  const row=document.getElementById(rowId);
  row.innerHTML='';
  T[lang][key].forEach(v=>{
    const b=document.createElement('div');
    b.className='fq-btn';b.textContent=v;b.dataset.group=key;
    b.onclick=()=>toggleFQ(b);
    row.appendChild(b);
  });
}

function updateSummary(){
  const sum=document.getElementById('selectedSummary'),fu=document.getElementById('followUp'),t=T[lang];
  if(selected.size===0){sum.textContent=t.noSelected;fu.style.display='none';}
  else{sum.textContent=t.selectedPrefix+[...selected].join(' · ');fu.style.display='flex';}
}
function toggleFQ(el){
  document.querySelectorAll(`.fq-btn[data-group="${el.dataset.group}"]`).forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function getFQ(key){
  const el=document.querySelector(`.fq-btn[data-group="${key}"].selected`);
  return el?el.textContent:T[lang].notSelected;
}

/* BACKGROUNDS */

let bgIdx=Math.floor(Math.random()*images.length),activeLayer=1;
const bg1=document.getElementById('bg1'),bg2=document.getElementById('bg2');
bg1.style.backgroundImage=`url(${images[bgIdx]})`;bg1.style.opacity=1;
function nextBg(){
  let n;do{n=Math.floor(Math.random()*images.length);}while(n===bgIdx);bgIdx=n;
  if(activeLayer===1){bg2.style.backgroundImage=`url(${images[bgIdx]})`;bg2.style.opacity=1;bg1.style.opacity=0;activeLayer=2;}
  else{bg1.style.backgroundImage=`url(${images[bgIdx]})`;bg1.style.opacity=1;bg2.style.opacity=0;activeLayer=1;}
}
setInterval(nextBg,10000);

/* WAKE */
window.addEventListener('DOMContentLoaded',()=>{
  fetch("https://catmind-ai-server.onrender.com/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:"ping"})}).catch(()=>{});
  buildSymptoms();buildFQ('rowAge','age');buildFQ('rowLife','life');buildFQ('rowDuration','duration');
});

/* URGENCY */
function setUrgency(level){
  const bar=document.getElementById('urgencyBar');bar.style.display='block';
  const cls={1:'urgency-low',2:'urgency-medium',3:'urgency-high',4:'urgency-critical'};
  bar.className=cls[level]||cls[2];bar.innerHTML=T[lang].urgency[level]||T[lang].urgency[2];
}

/* ANALYSIS */
async function executeAnalysis(){
  const resultEl=document.getElementById('resultContainer'),btn=document.getElementById('analyzeBtn'),urgencyEl=document.getElementById('urgencyBar'),t=T[lang];
  if(selected.size===0){resultEl.innerHTML=t.selectFirst;return;}
  btn.disabled=true;document.getElementById('btnText').textContent=t.btnAnalyzing;
  urgencyEl.style.display='none';resultEl.innerHTML='';resultEl.classList.add('cursor');
  const prompt=`${t.promptIntro}\n\nסימפטומים: ${[...selected].join(', ')}\nגיל: ${getFQ('age')}\nסוג חיים: ${getFQ('life')}\nמשך: ${getFQ('duration')}\n\n${t.sections}`;
  try{
    const res=await fetch("https://catmind-ai-server.onrender.com/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:prompt})});
    const data=await res.json();finalize(data.result||data.text||'');
  }catch(e){resultEl.classList.remove('cursor');resultEl.innerHTML=t.serverError;}
  finally{btn.disabled=false;document.getElementById('btnText').textContent=t.btnAnalyze;}
}

function finalize(raw){
  const t=T[lang];
  document.getElementById('resultContainer').classList.remove('cursor');
  const match=raw.match(t.urgencyRgx);
  if(match)setUrgency(parseInt(match[1]));
  else if(/חירום|emergency|immediate/i.test(raw))setUrgency(4);
  else if(/דחוף|urgent|today/i.test(raw))setUrgency(3);
  else if(/בינוני|moderate/i.test(raw))setUrgency(2);
  else setUrgency(1);
  const clean=raw.replace(t.urgencyStrip,'').trim();
  document.getElementById('resultContainer').innerHTML=marked.parse(clean);
}

/* ══════════════════════════════════════
   WALKING CAT
   SVG is drawn facing RIGHT.
   dir=1  → moving right → scaleX(1)  = faces right ✓
   dir=-1 → moving left  → scaleX(-1) = mirror = faces left ✓
══════════════════════════════════════ */
(function(){
  const wrap   = document.getElementById('catWrap');
  const bubble = document.getElementById('catBubble');
  const legFL  = document.getElementById('leg-fl');
  const legFR  = document.getElementById('leg-fr');
  const legBL  = document.getElementById('leg-bl');
  const legBR  = document.getElementById('leg-br');
  const tail   = document.getElementById('catTail');
  const catSvg = document.getElementById('catSvg');

  let catState='walking', x, y, dir=1;
  let walkTimer=0, stateTimer=0, meowCooldown=5;
  let pausesUntilLook=2+Math.floor(Math.random()*3);
  let acCtx=null;

  function getAC(){if(!acCtx)acCtx=new(window.AudioContext||window.webkitAudioContext)();return acCtx;}

  function catMeow(){
    try{
      const ac=getAC(),o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
      f.type='bandpass';f.frequency.value=700;f.Q.value=2.5;
      o.connect(f);f.connect(g);g.connect(ac.destination);o.type='sawtooth';
      o.frequency.setValueAtTime(320,ac.currentTime);
      o.frequency.linearRampToValueAtTime(560,ac.currentTime+0.15);
      o.frequency.linearRampToValueAtTime(430,ac.currentTime+0.30);
      o.frequency.linearRampToValueAtTime(370,ac.currentTime+0.46);
      g.gain.setValueAtTime(0,ac.currentTime);
      g.gain.linearRampToValueAtTime(0.12,ac.currentTime+0.05);
      g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.5);
      o.start(ac.currentTime);o.stop(ac.currentTime+0.52);
    }catch(e){}
  }

  function randY(){return 12+Math.floor(Math.random()*80);}

  function showBubble(){
    const phrases=T[lang].phrases;
    const text=phrases[Math.floor(Math.random()*phrases.length)];
    bubble.textContent=text;
    bubble.style.left=(x+64)+'px';
    bubble.style.bottom=(y+52)+'px';
    bubble.style.opacity='1';
    setTimeout(()=>{bubble.style.opacity='0';},2600);
  }

  /* leg animation — sine wave gait */
  function animateLegs(t){
    const f1= Math.sin(t*8);
    const f2= Math.sin(t*8+Math.PI);
    const b1= Math.sin(t*8+Math.PI);
    const b2= Math.sin(t*8);
    // front legs (x1 around 36 and 40)
    legFL.setAttribute('x2',(32+f1*5).toFixed(1)); legFL.setAttribute('y2','42');
    legFR.setAttribute('x2',(44+f2*5).toFixed(1)); legFR.setAttribute('y2','42');
    // back legs (x1 around 22 and 26)
    legBL.setAttribute('x2',(18+b1*5).toFixed(1)); legBL.setAttribute('y2','42');
    legBR.setAttribute('x2',(30+b2*5).toFixed(1)); legBR.setAttribute('y2','42');
    // tail wag
    const tw=Math.sin(t*3)*7;
    tail.setAttribute('d',`M14,22 Q${2+tw*0.3},${16-tw*0.4} ${4+tw*0.2},${9-tw}`);
  }

  function stopLegs(){
    legFL.setAttribute('x2','32');legFL.setAttribute('y2','42');
    legFR.setAttribute('x2','44');legFR.setAttribute('y2','42');
    legBL.setAttribute('x2','18');legBL.setAttribute('y2','42');
    legBR.setAttribute('x2','30');legBR.setAttribute('y2','42');
  }

  function applyDir(){
    // SVG faces right → dir=1: no flip, dir=-1: flip horizontally around centre
    catSvg.style.transform = dir===1 ? 'scaleX(1)' : 'scaleX(-1)';
    catSvg.style.transformOrigin = '30px 22px'; // centre of SVG
  }

  function startPause(){
    pausesUntilLook--;
    y=randY(); wrap.style.bottom=y+'px';
    stopLegs(); catMeow(); meowCooldown=5;
    if(pausesUntilLook<=0){
      catState='looking'; stateTimer=2.5+Math.random()*2;
      pausesUntilLook=2+Math.floor(Math.random()*3);
      showBubble();
      // face toward screen centre
      const faceRight = x < window.innerWidth*0.5;
      catSvg.style.transform = faceRight ? 'scaleX(1) scale(1.08)' : 'scaleX(-1) scale(1.08)';
    }else{
      catState='pausing'; stateTimer=1.5+Math.random()*3;
      applyDir();
    }
  }

  // init
  dir  = Math.random()>0.5 ? 1 : -1;
  x    = dir===1 ? -60 : window.innerWidth+10;
  y    = randY();
  wrap.style.bottom=y+'px'; wrap.style.left=x+'px';
  applyDir();
  setTimeout(()=>catMeow(),3000);

  let last=null;
  function loop(ts){
    if(!last)last=ts;
    const dt=Math.min((ts-last)/1000,0.05);
    last=ts; meowCooldown-=dt; stateTimer-=dt;

    if(catState==='walking'){
      x+=dir*40*dt; walkTimer+=dt;
      animateLegs(walkTimer);
      wrap.style.left=x+'px';
      applyDir();
      if(meowCooldown<=0&&Math.random()<0.003){catMeow();meowCooldown=10+Math.random()*15;}
      const W=window.innerWidth;
      if(x>W+10){x=W+10;dir=-1;startPause();}
      else if(x<-60){x=-60;dir=1;startPause();}
    }else if(catState==='pausing'||catState==='looking'){
      if(stateTimer<=0){catState='walking';applyDir();}
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
