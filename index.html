```html
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatMind AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{
--turquoise:#22d3ee;
--green:#22c55e;
--yellow:#facc15;
--red:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
min-height:100vh;
font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
color:#fff;
background:#020617;
overflow-x:hidden;
}

/* BACKGROUND */

.bg-layer{
position:fixed;
inset:0;
background-size:cover;
background-position:center 20%;
background-repeat:no-repeat;
transition:opacity 1.5s ease;
filter:brightness(.6) contrast(1.1);
z-index:0;
}

#bg2{opacity:0;}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.4),rgba(0,0,0,.1));
z-index:1;
}

/* CARD */

.card{
position:absolute;
right:50px;
top:50%;
transform:translateY(-50%);
z-index:2;

width:430px;
max-width:94%;
height:94vh;

display:flex;
flex-direction:column;

background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
backdrop-filter:blur(40px) saturate(150%);
border-radius:28px;
padding:24px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 40px 100px rgba(0,0,0,.6);
}

@media(max-width:768px){
.card{
position:relative;
top:auto;
right:auto;
transform:none;
margin:20px auto;
height:auto;
min-height:90vh;
}
}

/* HEADER */

h1{
text-align:center;
font-size:22px;
margin-bottom:15px;
color:var(--turquoise);
}

/* SELECT */

select{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.2);
margin-bottom:12px;
background:#0f172a;
color:#fff;
font-size:14px;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:var(--turquoise);
font-weight:700;
cursor:pointer;
color:#06131c;
font-size:16px;
margin-bottom:10px;
}

/* URGENCY BAR */

#urgencyBar{
display:none;
padding:10px;
border-radius:12px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.urgency-low{background:var(--green);color:#021c09;}
.urgency-medium{background:var(--yellow);color:#332b00;}
.urgency-high{background:var(--red);}

/* RESULT */

.result-scroll-wrapper{
flex:1;
overflow-y:auto;
background:rgba(0,0,0,.2);
border-radius:18px;
border:1px solid rgba(34,211,238,.1);
}

.result-scroll-wrapper::-webkit-scrollbar{width:4px;}
.result-scroll-wrapper::-webkit-scrollbar-thumb{
background:var(--turquoise);
border-radius:10px;
}

#resultContainer{
padding:18px;
font-size:14.5px;
line-height:1.7;
color:#e2e8f0;
direction:rtl;
text-align:right;
}

/* DISCLAIMER */

.disclaimer{
margin-top:10px;
padding:10px;
background:rgba(255,165,0,0.15);
border:1px solid rgba(255,165,0,0.4);
border-radius:12px;
font-size:12px;
text-align:center;
}

/* FOOTER */

.card-footer{
border-top:1px solid rgba(255,255,255,.1);
padding-top:10px;
margin-top:10px;
}

.links-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.link-btn{
display:block;
text-align:center;
padding:8px;
border-radius:10px;
background:rgba(255,255,255,.07);
color:#fff;
text-decoration:none;
font-size:11.5px;
border:1px solid rgba(255,255,255,.1);
transition:.3s;
}

.link-btn:hover{
background:rgba(255,255,255,.15);
border-color:var(--turquoise);
}

</style>
</head>

<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

<h1>🐱 CatMind AI</h1>

<select id="mainSymptom">

<option value="">בחר סימפטום</option>

<option>הקאות</option>
<option>שלשול</option>
<option>עצירות</option>
<option>חוסר תיאבון</option>
<option>ירידה במשקל</option>
<option>עלייה במשקל</option>
<option>עייפות קיצונית</option>
<option>קושי בנשימה</option>
<option>שיעול</option>
<option>התעטשויות</option>
<option>הפרשות מהאף</option>
<option>הפרשות מהעיניים</option>
<option>גירודים</option>
<option>נשירת שיער חריגה</option>
<option>פצעים בעור</option>
<option>נפיחות בגוף</option>
<option>צליעה</option>
<option>חוסר שימוש בארגז חול</option>
<option>דם בשתן</option>
<option>שינויים בהתנהגות</option>
<option>אגרסיביות פתאומית</option>
<option>רעידות</option>
<option>פרכוסים</option>
<option>הרעלה אפשרית</option>
<option>בליעת חפץ זר</option>
<option>חום גבוה</option>
<option>אובדן הכרה</option>

</select>

<button onclick="executeAnalysis()">נתח מקרה</button>

<div id="urgencyBar"></div>

<div class="result-scroll-wrapper">
<div id="resultContainer">
האבחנה תופיע כאן
</div>
</div>

<div class="disclaimer">
⚠ הכלי נועד למידע בלבד ואינו מחליף ייעוץ וטרינרי מקצועי.
</div>

<div class="card-footer">

<div class="links-grid">

<a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">ד"ר טלי שטיין</a>

<a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">ד"ר תמר פלידל</a>

<a class="link-btn" href="https://icatcare.org/" target="_blank">International Cat Care</a>

<a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">Browse All Breeds</a>

</div>

</div>

</div>

<script>

/* CAT BACKGROUNDS */

const images=[

"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1573865526739-10659fec78a5?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1518791841217-8f162f1e1131?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1495360010541-f48722b34f7d?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1511044568932-338cba0ad803?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1533738363-b7f9aef128ce?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1548247416-ec66f4900b2e?q=80&w=1920&auto=format&fit=crop"

];

let currentIndex=0;
let activeLayer=1;

const bg1=document.getElementById("bg1");
const bg2=document.getElementById("bg2");

bg1.style.backgroundImage=`url(${images[0]})`;

function nextBackground(){

currentIndex++;

if(currentIndex>=images.length) currentIndex=0;

if(activeLayer===1){

bg2.style.backgroundImage=`url(${images[currentIndex]})`;
bg2.style.opacity=1;
bg1.style.opacity=0;
activeLayer=2;

}else{

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
activeLayer=1;

}

}

setInterval(nextBackground,10000);

/* WAKE SERVER */

window.addEventListener('DOMContentLoaded',()=>{

fetch("https://catmind-ai-server.onrender.com/generate",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:"ping"})

}).catch(()=>{});

});

/* AI */

async function executeAnalysis(){

const result=document.getElementById("resultContainer");
const urgencyBar=document.getElementById("urgencyBar");

const symptom=document.getElementById("mainSymptom").value;

if(!symptom){

result.innerHTML="⚠ בחר סימפטום מהרשימה";

return;

}

result.innerHTML="🔍 מנתח סימפטום...";

urgencyBar.style.display="none";

try{

const response=await fetch(

"https://catmind-ai-server.onrender.com/generate",

{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

text:`אתה וטרינר מומחה לחתולים בלבד.

הסימפטום הוא:
${symptom}

ענה בעברית בפורמט:

רמת דחיפות: נמוכה / בינונית / גבוהה

אבחנה אפשרית:
גורמים אפשריים:
מה מומלץ לעשות:`

})

}

);

const data=await response.json();

const text=data.result;

result.innerHTML=marked.parse(text);

if(text.includes("גבוה")){

urgencyBar.className="urgency-high";
urgencyBar.innerHTML="🚨 מצב חירום — פנה לוטרינר מיד";

}

else if(text.includes("בינונ")){

urgencyBar.className="urgency-medium";
urgencyBar.innerHTML="⚠ מומלץ להתייעץ עם וטרינר";

}

else{

urgencyBar.className="urgency-low";
urgencyBar.innerHTML="✔ מצב כנראה לא דחוף";

}

urgencyBar.style.display="block";

}

catch{

result.innerHTML="❌ השרת לא זמין כרגע";

}

}

</script>

</body>
</html>
```
