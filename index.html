<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatMind AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root { --turquoise: #22d3ee; }
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
height: 100vh;
font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
color: #fff;
background: #020617;
overflow: hidden;
}

/* ===== רקע משתנה ===== */

.bg-layer {
position: fixed;
inset: 0;
background-size: cover;
background-position: center 20%;
background-repeat: no-repeat;
transition: opacity 1.5s ease;
filter: brightness(0.6) contrast(1.1);
z-index: 0;
}

#bg2 { opacity: 0; }

.overlay {
position: fixed;
inset: 0;
background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.1) 100%);
z-index: 1;
}

/* ===== Card ===== */

.card {
position: absolute;
right: 50px;
top: 50%;
transform: translateY(-50%);
z-index: 2;

width: 420px;
max-width: 90%;
height: 94vh;

display: flex;
flex-direction: column;

background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03));

backdrop-filter: blur(40px) saturate(150%);
-webkit-backdrop-filter: blur(40px) saturate(150%);

border-radius: 28px;
padding: 25px;

border: 1px solid rgba(255,255,255,0.2);
box-shadow: 0 40px 100px rgba(0,0,0,0.6);
}

.card-header { flex-shrink: 0; margin-bottom: 10px; }

h1 {
text-align: center;
font-size: 22px;
margin-bottom: 15px;
color: var(--turquoise);
text-shadow: 0 2px 10px rgba(34,211,238,0.3);
}

select {
width: 100%;
padding: 12px;
border-radius: 14px;
border: 1px solid rgba(255,255,255,0.2);
margin-bottom: 12px;
background: #0f172a;
color: #fff;
font-size: 14px;
outline: none;
}

button {
width: 100%;
padding: 14px;
border-radius: 14px;
border: none;
background: var(--turquoise);
font-weight: 700;
cursor: pointer;
color: #06131c;
font-size: 16px;
transition: 0.2s;
}

button:hover { filter: brightness(1.1); }

.result-scroll-wrapper {
flex: 1;
overflow-y: auto;
margin-bottom: 15px;
background: rgba(0, 0, 0, 0.2);
border-radius: 18px;
border: 1px solid rgba(34,211,238,0.1);
}

#resultContainer {
padding: 18px;
font-size: 14.5px;
line-height: 1.7;
color: #e2e8f0;
direction: rtl;
text-align: right;
}

.card-footer {
flex-shrink: 0;
display: flex;
flex-direction: column;
gap: 10px;
border-top: 1px solid rgba(255,255,255,0.1);
padding-top: 15px;
}

.disclaimer {
padding: 10px;
border-radius: 14px;
background: rgba(251,191,36,0.1);
border: 1px solid rgba(251,191,36,0.2);
font-size: 10.5px;
color: #fde68a;
text-align: center;
}

.section-title {
color: var(--turquoise);
font-size: 12px;
margin-bottom: 4px;
opacity: 0.9;
font-weight: 600;
}

.links-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
}

.link-btn {
display: block;
text-align: center;
padding: 8px;
border-radius: 10px;
background: rgba(255,255,255,0.07);
color: #fff;
text-decoration: none;
font-size: 11.5px;
border: 1px solid rgba(255,255,255,0.1);
transition: 0.3s;
}

.link-btn:hover {
background: rgba(255,255,255,0.15);
border-color: var(--turquoise);
}

@media (max-width: 768px) {
.card {
position: relative;
right: auto;
top: auto;
transform: none;
margin: 15px auto;
width: 92%;
height: 90vh;
}
}

</style>
</head>

<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

<div class="card-header">

<h1>🐱 CatMind AI</h1>

<select id="mainSymptom">
<option value="">בחר בעיה מהרשימה</option>
<option value="Vomiting">הקאות</option>
<option value="Diarrhea">שלשול</option>
<option value="Constipation">עצירות</option>
<option value="Loss of appetite">חוסר תיאבון</option>
<option value="Weight loss">ירידה במשקל</option>
<option value="Breathing difficulty">קושי בנשימה</option>
<option value="Coughing">שיעול</option>
<option value="Frequent sneezing">התעטשויות תכופות</option>
<option value="Eye discharge">הפרשות מהעיניים</option>
<option value="Excessive itching">גירודים</option>
<option value="Limping">צליעה</option>
<option value="Blood in urine">דם בשתן</option>
<option value="Behavioral changes">שינויים בהתנהגות</option>
<option value="Trembling">רעידות</option>
<option value="Seizures">פרכוסים</option>
<option value="Possible poisoning">הרעלה אפשרית</option>
<option value="Swallowed foreign object">בליעת חפץ זר</option>
</select>

<button onclick="executeAnalysis()">נתח מקרה</button>

</div>

<div class="result-scroll-wrapper">
<div id="resultContainer">האבחנה תופיע כאן...</div>
</div>

<div class="card-footer">

<div class="disclaimer">
⚠ הכלי להכוונה בלבד ואינו מחליף ייעוץ וטרינרי. במקרה חירום פנה לוטרינר.
</div>

<div>
<div class="section-title">מידע נוסף</div>
<a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">Browse All Breeds</a>
</div>

<div>
<div class="section-title">וטרינרים מומלצים</div>
<div class="links-grid">
<a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">ד"ר טלי שטיין</a>
<a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">ד"ר תמר פלידל</a>
</div>
</div>

</div>
</div>

<script>

async function executeAnalysis(){

const select=document.getElementById("mainSymptom");
const result=document.getElementById("resultContainer");

if(!select.value){
result.innerHTML="⚠ אנא בחר בעיה מהרשימה.";
return;
}

result.innerHTML="🔍 CatMind מנתח את הסימפטומים...";

try{

const response=await fetch(
"https://catmind-ai-server.onrender.com/generate",
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
text:`
אתה וטרינר מומחה לחתולים בלבד.

נתח רק את הסימפטום הבא:
${select.value}

אל תוסיף סימפטומים אחרים.

ענה בפורמט הבא בלבד:

כותרת:
גורמים אפשריים:
רמת דחיפות:
מה מומלץ לעשות:
`
})
}
);

const data=await response.json();

let output=data.result || "לא התקבלה תשובה";

result.innerHTML="<strong>אבחנת CatMind:</strong><br><br>"+marked.parse(output);

}catch(err){

result.innerHTML="❌ השרת מתעורר. נסה שוב בעוד כמה שניות.";

}

}

/* תמונות רקע */

const images=[
"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1573865526739-10659fec78a5?q=80&w=1920&auto=format&fit=crop",
"https://images.unsplash.com/photo-1495360010541-f48722b34f7d?q=80&w=1920&auto=format&fit=crop"
];

let index=0;

document.getElementById("bg1").style.backgroundImage=`url(${images[0]})`;

setInterval(()=>{
index=(index+1)%images.length;
document.getElementById("bg1").style.backgroundImage=`url(${images[index]})`;
},10000);

</script>

</body>
</html>
