<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatMind AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{ --turquoise:#22d3ee; }

*{box-sizing:border-box;margin:0;padding:0;}

body{
min-height:100vh;
font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
color:#fff;
background:#020617;
overflow-x:hidden;
}

/* BACKGROUND */

.bg-layer{
position:fixed;
inset:0;
background-size:cover;
background-position:center 20%;
background-repeat:no-repeat;
transition:opacity 1.5s ease;
filter:brightness(.6) contrast(1.1);
z-index:0;
}

#bg2{opacity:0;}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.4),rgba(0,0,0,.1));
z-index:1;
}

/* CARD */

.card{
position:absolute;
right:50px;
top:50%;
transform:translateY(-50%);
z-index:2;

width:430px;
max-width:94%;
height:94vh;

display:flex;
flex-direction:column;

background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
backdrop-filter:blur(40px) saturate(150%);
border-radius:28px;
padding:24px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 40px 100px rgba(0,0,0,.6);
}

/* MOBILE */

@media(max-width:768px){

.card{
position:relative;
top:auto;
right:auto;
transform:none;
margin:20px auto;
height:auto;
min-height:90vh;
}

}

/* HEADER */

h1{
text-align:center;
font-size:22px;
margin-bottom:15px;
color:var(--turquoise);
}

/* SYMPTOMS LIST */

.symptom-list{
flex:0 0 auto;
max-height:160px;
overflow-y:auto;
background:#0f172a;
border-radius:12px;
padding:10px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,.15);
}

.symptom-item{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
margin-bottom:4px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:var(--turquoise);
font-weight:700;
cursor:pointer;
color:#06131c;
font-size:16px;
margin-bottom:10px;
}

/* RESULT */

.result-scroll-wrapper{
flex:1;
overflow-y:auto;
background:rgba(0,0,0,.2);
border-radius:18px;
border:1px solid rgba(34,211,238,.1);
}

#resultContainer{
padding:18px;
font-size:14.5px;
line-height:1.7;
color:#e2e8f0;
direction:rtl;
text-align:right;
white-space:normal;
overflow-wrap:break-word;
}

/* FOOTER */

.card-footer{
border-top:1px solid rgba(255,255,255,.1);
padding-top:10px;
margin-top:10px;
}

.links-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.link-btn{
display:block;
text-align:center;
padding:8px;
border-radius:10px;
background:rgba(255,255,255,.07);
color:#fff;
text-decoration:none;
font-size:11.5px;
border:1px solid rgba(255,255,255,.1);
}

</style>

</head>

<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

<h1>🐱 CatMind AI</h1>

<div class="symptom-list" id="symptomList"></div>

<button onclick="executeAnalysis()">נתח סימפטומים</button>

<div class="result-scroll-wrapper">

<div id="resultContainer">

בחר סימפטומים מהרשימה

</div>

</div>

<div class="card-footer">

<div class="links-grid">

<a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">ד"ר טלי שטיין</a>

<a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">ד"ר תמר פלידל</a>

<a class="link-btn" href="https://icatcare.org/" target="_blank">International Cat Care</a>

<a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">Browse All Breeds</a>

</div>

</div>

</div>

<script>

/* CAT BACKGROUNDS */

const images=[

"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
"https://images.unsplash.com/photo-1573865526739-10659fec78a5",
"https://images.unsplash.com/photo-1518791841217-8f162f1e1131",
"https://images.unsplash.com/photo-1495360010541-f48722b34f7d",
"https://images.unsplash.com/photo-1511044568932-338cba0ad803",
"https://images.unsplash.com/photo-1533738363-b7f9aef128ce",
"https://images.unsplash.com/photo-1548247416-ec66f4900b2e",
"https://images.unsplash.com/photo-1513245543132-31f507417b26",
"https://images.unsplash.com/photo-1519052537078-e6302a4968d4"

];

let currentIndex=Math.floor(Math.random()*images.length);

let activeLayer=1;

const bg1=document.getElementById("bg1");
const bg2=document.getElementById("bg2");

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;

function nextBackground(){

let nextIndex;

do{
nextIndex=Math.floor(Math.random()*images.length);
}while(nextIndex===currentIndex);

currentIndex=nextIndex;

if(activeLayer===1){

bg2.style.backgroundImage=`url(${images[currentIndex]})`;
bg2.style.opacity=1;
bg1.style.opacity=0;
activeLayer=2;

}else{

bg1.style.backgroundImage=`url(${images[currentIndex]})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
activeLayer=1;

}

}

setInterval(nextBackground,10000);

/* SYMPTOMS */

const symptoms=[

"הקאות",
"שלשול",
"עצירות",
"חוסר תיאבון",
"ירידה במשקל",
"עלייה במשקל",
"עייפות קיצונית",
"קושי בנשימה",
"שיעול",
"התעטשויות",
"הפרשות מהאף",
"הפרשות מהעיניים",
"גירודים",
"נשירת שיער חריגה",
"פצעים בעור",
"נפיחות בגוף",
"צליעה",
"חוסר שימוש בארגז חול",
"דם בשתן",
"שינויים בהתנהגות",
"אגרסיביות פתאומית",
"רעידות",
"פרכוסים",
"הרעלה אפשרית",
"בליעת חפץ זר",
"חום גבוה",
"אובדן הכרה"

];

const list=document.getElementById("symptomList");

symptoms.forEach(symptom=>{

list.innerHTML+=`
<div class="symptom-item">
<input type="checkbox" value="${symptom}">
<label>${symptom}</label>
</div>
`;

});

/* AI */

async function executeAnalysis(){

const result=document.getElementById("resultContainer");

const selected=[...document.querySelectorAll(".symptom-item input:checked")]

.map(el=>el.value);

if(selected.length===0){

result.innerHTML="⚠ בחר לפחות סימפטום אחד";

return;

}

result.innerHTML="🔍 מנתח סימפטומים...";

try{

const response=await fetch(

"https://catmind-ai-server.onrender.com/generate",

{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

text:`אתה וטרינר מומחה לחתולים בלבד.

הסימפטומים הם:
${selected.join(", ")}

ענה בעברית בפורמט:

אבחנה אפשרית:
גורמים אפשריים:
רמת דחיפות:
מה מומלץ לעשות:`

})

}

);

const data=await response.json();

result.innerHTML=marked.parse(data.result);

}catch{

result.innerHTML="❌ השרת לא זמין כרגע";

}

}

</script>

</body>
</html>
