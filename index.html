```html
<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatMind AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{
--turquoise:#22d3ee;
--green:#22c55e;
--yellow:#facc15;
--red:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
height:100vh;
font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
color:#fff;
background:#020617;
overflow:hidden;
}

/* BACKGROUND */

.bg-layer{
position:fixed;
inset:0;
background-size:cover;
background-position:center 20%;
background-repeat:no-repeat;
transition:opacity 1.5s ease;
filter:brightness(.6) contrast(1.1);
z-index:0;
}

#bg2{opacity:0;}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.4),rgba(0,0,0,.1));
z-index:1;
}

/* CARD */

.card{
position:absolute;
right:50px;
top:50%;
transform:translateY(-50%);
z-index:2;

width:430px;
max-width:92%;
height:94vh;

display:flex;
flex-direction:column;

background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
backdrop-filter:blur(40px) saturate(150%);
border-radius:28px;
padding:24px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 40px 100px rgba(0,0,0,.6);
}

@media(max-width:768px){

.card{
position:relative;
right:auto;
top:auto;
transform:none;
margin:15px auto;
height:90vh;
}

}

h1{
text-align:center;
font-size:22px;
margin-bottom:10px;
color:var(--turquoise);
}

input,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
margin-bottom:8px;
background:#0f172a;
color:#fff;
}

.symptom-box{
max-height:120px;
overflow:auto;
border:1px solid rgba(255,255,255,.15);
border-radius:12px;
padding:8px;
margin-bottom:8px;
}

button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:var(--turquoise);
font-weight:700;
cursor:pointer;
color:#06131c;
font-size:16px;
}

.result-scroll-wrapper{
flex:1;
overflow-y:auto;
margin-top:10px;
background:rgba(0,0,0,.2);
border-radius:18px;
border:1px solid rgba(34,211,238,.1);
}

#resultContainer{
padding:18px;
font-size:14px;
line-height:1.7;
}

#urgencyBar{
display:none;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:8px;
font-weight:700;
}

.urgency-low{background:var(--green);}
.urgency-medium{background:var(--yellow);color:#222;}
.urgency-high{background:var(--red);}

.disclaimer{
margin-top:10px;
padding:10px;
border-radius:12px;
background:rgba(251,191,36,.1);
border:1px solid rgba(251,191,36,.3);
font-size:11px;
text-align:center;
}

.links-grid{
margin-top:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.link-btn{
text-align:center;
padding:7px;
border-radius:10px;
background:rgba(255,255,255,.08);
color:#fff;
text-decoration:none;
font-size:11px;
border:1px solid rgba(255,255,255,.15);
}

</style>
</head>

<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>
<div class="overlay"></div>

<div class="card">

<h1>🐱 CatMind AI PRO</h1>

<input id="catAge" placeholder="גיל החתול (בשנים)">
<input id="catWeight" placeholder="משקל החתול (ק״ג)">

<div class="symptom-box" id="symptomList"></div>

<button onclick="executeAnalysis()">נתח מקרה</button>

<div id="urgencyBar"></div>

<div class="result-scroll-wrapper">
<div id="resultContainer">האבחנה תופיע כאן...</div>
</div>

<div class="disclaimer">
⚠ הכלי להכוונה בלבד ואינו מחליף ייעוץ וטרינרי מקצועי.
</div>

<div class="links-grid">

<a class="link-btn" href="https://www.talisteinvet.co.il/" target="_blank">ד"ר טלי שטיין</a>
<a class="link-btn" href="https://easy.co.il/page/3056876" target="_blank">ד"ר תמר פלידל</a>
<a class="link-btn" href="https://icatcare.org/" target="_blank">CatCare</a>
<a class="link-btn" href="https://www.whiskas.in/cat-breeds" target="_blank">Cat Breeds</a>

</div>

</div>

<script>

/* SYMPTOMS */

const symptoms=[

"הקאות","שלשול","עצירות","חוסר תיאבון","ירידה במשקל",
"עייפות","קושי בנשימה","שיעול","התעטשויות",
"הפרשות מהעיניים","גירודים","נשירת שיער",
"צליעה","דם בשתן","שינויים בהתנהגות",
"פרכוסים","הרעלה","בליעת חפץ זר","חום גבוה"

];

const list=document.getElementById("symptomList");

symptoms.forEach(symptom=>{
list.innerHTML+=`
<label>
<input type="checkbox" value="${symptom}">
${symptom}
</label><br>`;
});

/* BACKGROUND */

const images=[

"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
"https://images.unsplash.com/photo-1573865526739-10659fec78a5",
"https://images.unsplash.com/photo-1518791841217-8f162f1e1131",
"https://images.unsplash.com/photo-1495360010541-f48722b34f7d",
"https://images.unsplash.com/photo-1511044568932-338cba0ad803"

];

let index=0;

function changeBackground(){

document.getElementById("bg1").style.backgroundImage=`url(${images[index]})`;

index++;

if(index>=images.length) index=0;

}

setInterval(changeBackground,10000);

/* WAKE SERVER */

window.addEventListener('DOMContentLoaded',()=>{

fetch("https://catmind-ai-server.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:"ping"})
}).catch(()=>{});

});

/* AI */

async function executeAnalysis(){

const result=document.getElementById("resultContainer");
const urgency=document.getElementById("urgencyBar");

const age=document.getElementById("catAge").value;
const weight=document.getElementById("catWeight").value;

const selected=[...document.querySelectorAll("#symptomList input:checked")].map(e=>e.value);

if(selected.length===0){

result.innerHTML="⚠ בחר לפחות סימפטום אחד";
return;

}

result.innerHTML="🔍 מנתח נתונים...";

const response=await fetch(
"https://catmind-ai-server.onrender.com/generate",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

text:`אתה וטרינר מומחה לחתולים בלבד.

גיל החתול: ${age}
משקל: ${weight}

סימפטומים:
${selected.join(", ")}

ענה בעברית בפורמט:

רמת דחיפות:
גורמים אפשריים:
מה מומלץ לעשות:`})
});

const data=await response.json();

result.innerHTML=marked.parse(data.result);

if(data.result.includes("גבוה")){
urgency.className="urgency-high";
urgency.innerHTML="🚨 מצב חירום";
}

else if(data.result.includes("בינונ")){
urgency.className="urgency-medium";
urgency.innerHTML="⚠ מצב בינוני";
}

else{
urgency.className="urgency-low";
urgency.innerHTML="✔ מצב קל";
}

urgency.style.display="block";

}

</script>

</body>
</html>
```
